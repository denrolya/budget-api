# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    is_fixtures_loading: false
    base_currency: 'EUR'
    env(WEBHOOK_BASE_URL): ''
    allowed_currencies:
        - EUR
        - USD
        - UAH
        - HUF
        - BTC

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $baseCurrency: '%base_currency%'
            $fixerApiKey: "%env(FIXER_API_KEY)%"
            $wiseApiKey: "%env(WISE_API_KEY)%"
            $allowedCurrencies: '%allowed_currencies%'
            $webhookBaseUrl: "%env(WEBHOOK_BASE_URL)%"

    # make classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/DataFixtures/'

    jms_serializer.serialized_name_annotation_strategy:
        class: JMS\Serializer\Naming\SerializedNameAnnotationStrategy
        arguments:
            - '@jms_serializer.identical_property_naming_strategy'

    App\Serializer\PlainIdItemNormalizer:
        tags:
            - { name: serializer.normalizer, priority: -892 }

    doctrine.filter.configurator:
        class: App\Filter\Configurator
        arguments:
            - '@doctrine.orm.default_entity_manager'
            - '@security.helper'
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest }

    security.user_password_hasher:
        class: Symfony\Component\PasswordHasher\Hasher\UserPasswordHasher
        public: true
        arguments:
          [ '@security.password_hasher_factory' ]

    # --- Bank integrations ---
    # Any class implementing BankProviderInterface is auto-tagged.
    # Adding a new bank = new Provider class, zero config change needed.
    # All App\Bank\ services receive the dedicated 'bank' Monolog channel.
    _instanceof:
        App\Bank\BankProviderInterface:
            tags: ['app.bank_provider']

    App\Bank\BankSyncService:
        arguments:
            $logger: '@monolog.logger.bank'

    App\Bank\BankWebhookService:
        arguments:
            $logger: '@monolog.logger.bank'

    App\Bank\Provider\MonobankProvider:
        arguments:
            $monobankApiKey: '%env(MONOBANK_API_KEY)%'

    App\Bank\BankProviderRegistry:
        arguments:
            $providers: !tagged_iterator 'app.bank_provider'

    App\OpenApi\JwtDecorator:
        decorates: 'api_platform.openapi.factory'
        arguments: [ '@.inner' ]
        autoconfigure: false
        decoration_priority: 1000

    App\ApiPlatform\StiSubclassMetadataFactory:
        decorates: 'api_platform.metadata.resource.metadata_collection_factory'
        arguments: [ '@.inner' ]
        autoconfigure: false

    App\DataPersister\DebtDataPersister: ~
    App\DataPersister\TransferDataPersister: ~

    # Give Carbon value resolvers higher priority than RequestAttributeValueResolver (100)
    # so they always win when FOS REST QueryParam defaults are injected into request attributes.
    App\Request\ValueResolver\CarbonDateValueResolver:
        tags:
            - { name: controller.argument_value_resolver, priority: 150 }

    App\Request\ValueResolver\CarbonIntervalValueResolver:
        tags:
            - { name: controller.argument_value_resolver, priority: 150 }

    App\EventListener\TransactionListener:
        tags:
            - { name: doctrine.event_listener, event: onFlush }

    App\EventListener\DebtConvertedValueListener:
        tags:
            - { name: doctrine.event_listener, event: prePersist }
            - { name: doctrine.event_listener, event: preUpdate }

    App\ApiPlatform\ControllerOpenApiDecorator:
        decorates: api_platform.openapi.factory
        arguments:
            $decorated: '@.inner'

when@test:
    services:
        _defaults:
            autowire: true      # Automatically injects dependencies in your services.
            autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
            bind:
                $fixerApiKey: "dummy_api_key"
                $allowedCurrencies: ['EUR', 'USD', 'UAH', 'HUF', 'BTC']
                $baseCurrency: 'EUR'

        App\Service\FixerService:
            public: true

        App\Service\AssetsManager:
            public: true

